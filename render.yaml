# ────────────────────────────────────────────────────────────
# RescueMind AI — Render Blueprint (Infrastructure as Code)
# ────────────────────────────────────────────────────────────
# Deploys TWO services:
#   1. AI Service  — Transformers.js classification (Render)
#   2. Frontend    — Next.js app (Vercel — deploy separately)
#
# USAGE:
# 1. Push this file to GitHub
# 2. Go to https://dashboard.render.com → New+ → Blueprint
# 3. Connect your repo → Render creates the AI service
# 4. Deploy the frontend on Vercel separately
# 5. Call POST /api/warmup on the AI service to pre-load model
# ────────────────────────────────────────────────────────────

services:
  # ── AI Service (Transformers.js) ─────────────────────────
  # Runs the open-source ML model for offline classification.
  # The Next.js frontend (Vercel) proxies requests here.
  - type: web
    name: rescuemind-ai-service
    runtime: node
    repo: https://github.com/YOUR_USERNAME/rescuemind-ai
    branch: main
    region: singapore

    # Root is app/ai-service/ inside the monorepo
    rootDir: app/ai-service

    buildCommand: npm install
    startCommand: npm start

    healthCheckPath: /api/health

    # ⚠️ CRITICAL: Configure health check timeout in Render Dashboard:
    #    Settings → Health Check → Initial Delay (seconds): 120
    #    Settings → Health Check → Timeout Threshold: 60
    # This gives the model 2 minutes to start downloading before Render
    # checks health. The health endpoint responds instantly regardless.
    autoDeploy: true

    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=400"
      # Render auto-sets PORT to 10000

  # Note: Also deploy the frontend on Vercel:
  #   - Root: app/frontend
  #   - Framework: Next.js
  #   - Set AI_SERVICE_URL to this service's URL
  #   - Set GEMINI_API_KEY, NEXT_PUBLIC_SUPABASE_URL, etc.

  # ── Post-deploy warmup ──────────────────────────────────
  # After deployment, run these steps:
  #   1. Wait for health check to pass (GET /api/health returns 200)
  #   2. POST /api/warmup on the AI service to load the model
  #      (takes 2-3 minutes — service remains responsive during download)
  #   3. Confirm "model: loaded" response
  #   4. Demo is now ready — model is cached
